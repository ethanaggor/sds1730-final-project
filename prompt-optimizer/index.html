<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Prompt Optimizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<style>
  :root {
    --bg: #000; --surface: #0a0a0a; --surface-raised: #111;
    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14);
    --text: #ededed; --text-secondary: #a1a1a1; --text-muted: #666;
    --accent: #50e3c2; --accent-dim: rgba(80,227,194,0.12);
    --green: #50e3c2; --green-dim: rgba(80,227,194,0.12);
    --red: #ee0000; --red-dim: rgba(238,0,0,0.1);
    --yellow: #f5a623; --yellow-dim: rgba(245,166,35,0.12);
    --font: "Plus Jakarta Sans", -apple-system, sans-serif;
    --mono: "JetBrains Mono", "Fira Code", monospace;
    --radius: 8px; --radius-sm: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); overflow: hidden; }

  header {
    display: flex; align-items: center; gap: 20px; padding: 0 24px;
    height: 52px; border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }
  .logo span { color: var(--text-muted); font-weight: 400; margin-left: 6px; }

  #run-select {
    font-family: var(--mono); font-size: 11px; padding: 4px 8px;
    background: var(--surface-raised); color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    cursor: pointer; outline: none;
  }
  #run-select:hover { border-color: var(--border-strong); }
  #run-select option { background: var(--surface); color: var(--text); }

  .header-stats { display: flex; gap: 24px; margin-left: auto; }
  .stat { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .stat-label { color: var(--text-muted); font-size: 11px; }
  .stat-value { font-family: var(--mono); font-size: 12px; color: var(--text-secondary); }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge-idle { background: rgba(255,255,255,0.06); color: var(--text-muted); }
  .badge-running { background: var(--yellow-dim); color: var(--yellow); }
  .badge-running::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--yellow); animation: pulse 1.5s ease infinite;
  }
  .badge-complete { background: var(--green-dim); color: var(--green); }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .layout { display: grid; grid-template-columns: 260px 1fr 360px; height: calc(100vh - 52px); }

  .panel {
    border-right: 1px solid var(--border); overflow-y: auto; padding: 16px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .panel:last-child { border-right: none; }
  .panel-header {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;
  }

  .candidate {
    padding: 10px 12px; margin-bottom: 4px; border-radius: var(--radius-sm);
    border: 1px solid transparent; cursor: pointer; transition: all 0.15s ease;
  }
  .candidate:hover { background: rgba(255,255,255,0.03); border-color: var(--border); }
  .candidate.selected { background: var(--accent-dim); border-color: rgba(80,227,194,0.3); }
  .candidate.best { border-color: rgba(80,227,194,0.3); }
  .candidate-row { display: flex; justify-content: space-between; align-items: center; }
  .candidate-idx { font-family: var(--mono); font-size: 12px; font-weight: 500; }
  .candidate-score {
    font-family: var(--mono); font-size: 11px; padding: 2px 8px;
    border-radius: 100px; background: var(--green-dim); color: var(--green);
  }
  .candidate-preview {
    font-size: 11px; color: var(--text-muted); margin-top: 4px; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .candidate-meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-family: var(--mono); }

  .center-empty {
    display: flex; align-items: center; justify-content: center; height: 100%;
    color: var(--text-muted); font-size: 13px;
  }
  .detail-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .detail-title { font-size: 13px; font-weight: 600; }
  .detail-meta {
    display: flex; gap: 16px; font-family: var(--mono); font-size: 11px; color: var(--text-secondary);
  }

  .instruction-block {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; font-size: 13px; line-height: 1.7; white-space: pre-wrap;
    max-height: calc(100vh - 160px); overflow-y: auto; font-family: var(--mono);
    color: var(--text-secondary);
  }

  .traj-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .traj-badge {
    font-family: var(--mono); font-size: 12px; padding: 4px 10px;
    border-radius: var(--radius-sm); background: var(--surface-raised);
    border: 1px solid var(--border);
  }

  .iteration { margin-bottom: 24px; animation: fadeIn 0.2s ease; }
  .iteration-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
  }
  .iteration-label::before {
    content: ""; display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; border: 2px solid var(--accent); flex-shrink: 0;
  }

  .reasoning-block {
    padding: 12px 16px; margin-bottom: 8px; border-radius: var(--radius-sm);
    background: var(--surface); border-left: 2px solid var(--accent);
    font-size: 13px; line-height: 1.6; color: var(--text-secondary);
  }
  .reasoning-block h1, .reasoning-block h2, .reasoning-block h3, .reasoning-block h4 {
    font-size: 12px; font-weight: 600; color: var(--text);
    margin: 12px 0 6px; letter-spacing: 0.02em;
  }
  .reasoning-block h1:first-child, .reasoning-block h2:first-child, .reasoning-block h3:first-child {
    margin-top: 0;
  }
  .reasoning-block ul, .reasoning-block ol { padding-left: 20px; margin: 6px 0; }
  .reasoning-block li { margin: 2px 0; }
  .reasoning-block table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 11px; font-family: var(--mono); }
  .reasoning-block th, .reasoning-block td {
    padding: 4px 8px; border-bottom: 1px solid var(--border); text-align: left;
  }
  .reasoning-block th { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; font-family: var(--font); }
  .reasoning-block strong { color: var(--text); }
  .reasoning-block em { color: var(--text-secondary); font-style: italic; }
  .reasoning-block code {
    font-family: var(--mono); background: rgba(255,255,255,0.06);
    padding: 1px 4px; border-radius: 3px; font-size: 0.9em;
  }
  .reasoning-block p { margin: 6px 0; }
  .reasoning-block p:first-child { margin-top: 0; }
  .reasoning-block p:last-child { margin-bottom: 0; }
  .reasoning-block blockquote {
    border-left: 2px solid var(--border-strong); padding-left: 12px;
    margin: 8px 0; color: var(--text-muted);
  }

  .code-block {
    margin-bottom: 8px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); overflow-x: auto;
  }
  .code-block pre[class*="language-"] {
    background: var(--surface-raised) !important;
    margin: 0; padding: 12px 16px; border-radius: var(--radius-sm);
    font-size: 12px; line-height: 1.6;
  }
  .code-block code[class*="language-"] {
    font-family: var(--mono); font-size: 12px;
  }
  .code-label {
    font-size: 10px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 6px; font-family: var(--font);
  }

  .output-block {
    padding: 12px 16px; border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px; line-height: 1.5;
    color: var(--text-muted); max-height: 200px; overflow-y: auto;
  }
  .output-block pre { white-space: pre-wrap; margin: 0; font-family: inherit; font-size: inherit; }
  .output-block table { width: 100%; border-collapse: collapse; margin: 4px 0; }
  .output-block th, .output-block td {
    padding: 2px 6px; border-bottom: 1px solid var(--border); text-align: left; font-size: 11px;
  }
  .output-block th { color: var(--text-muted); font-size: 10px; }
  .output-block p { margin: 4px 0; }
  .output-block h1, .output-block h2, .output-block h3 {
    font-size: 11px; font-weight: 600; color: var(--text-secondary); margin: 8px 0 4px;
  }
  .output-block strong { color: var(--text-secondary); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  #perf-chart { width: 100%; height: 140px; margin-bottom: 20px; }
  #perf-chart svg { width: 100%; height: 100%; }

  .phase-progress {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    margin-bottom: 8px; border-bottom: 1px solid var(--border-strong);
  }
  .phase-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; white-space: nowrap;
  }
  .phase-label.baseline { color: #8b9dc3; }
  .phase-label.optimizing { color: var(--yellow); }
  .phase-label.complete { color: var(--green); }
  .phase-bar {
    flex: 1; height: 3px; background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }
  .phase-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .phase-bar-fill.baseline { background: #8b9dc3; }
  .phase-bar-fill.optimizing { background: var(--yellow); }
  .phase-bar-fill.complete { background: var(--green); }
  .phase-count {
    font-family: var(--mono); font-size: 10px; color: var(--text-muted); white-space: nowrap;
  }

  .phase-banner {
    margin: 4px -16px; padding: 6px 16px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px;
  }
  .phase-banner.baseline {
    background: rgba(139,157,195,0.08); color: #8b9dc3;
    border-top: 1px solid rgba(139,157,195,0.2); border-bottom: 1px solid rgba(139,157,195,0.2);
  }
  .phase-banner.optimizing {
    background: var(--yellow-dim); color: var(--yellow);
    border-top: 1px solid rgba(245,166,35,0.25); border-bottom: 1px solid rgba(245,166,35,0.25);
  }
  .phase-banner::before {
    content: ""; display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: currentColor; flex-shrink: 0;
  }

  .iter-separator {
    margin: 2px -16px; padding: 5px 16px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: #8b7355;
    border-top: 1px dashed rgba(139,115,85,0.3);
    display: flex; align-items: center; gap: 6px;
  }
  .iter-separator::before {
    content: ""; display: inline-block; width: 4px; height: 4px;
    border-radius: 50%; background: #8b7355; flex-shrink: 0;
  }

  .event {
    padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px;
    cursor: pointer; transition: background 0.1s ease;
  }
  .event:hover { background: rgba(255,255,255,0.02); margin: 0 -16px; padding: 10px 16px; }
  .event-row { display: flex; align-items: center; gap: 8px; }
  .event-time { font-family: var(--mono); font-size: 10px; color: var(--text-muted); min-width: 64px; }
  .event-type {
    font-size: 10px; font-weight: 600; padding: 2px 6px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .event-type.eval-baseline { background: rgba(139,157,195,0.12); color: #8b9dc3; }
  .event-type.eval-mutation { background: var(--yellow-dim); color: var(--yellow); }
  .event-type.candidate { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
  .event-type.optimization_start { background: var(--yellow-dim); color: var(--yellow); }
  .event-type.optimization_complete { background: var(--green-dim); color: var(--green); }
  .event-type.phase { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
  .event-body { color: var(--text-secondary); margin-top: 4px; font-family: var(--mono); font-size: 11px; }
  .event-body.baseline { color: #7a8baa; }
  .event-body.mutation { color: #c9a04e; }
  .event.selected { background: var(--accent-dim); margin: 0 -16px; padding: 10px 16px; border-radius: var(--radius-sm); }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 24px; color: var(--text-muted); font-size: 13px; text-align: center;
    gap: 8px;
  }
  .empty-state-icon { font-size: 24px; opacity: 0.3; margin-bottom: 4px; }

  .pred-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-family: var(--mono); font-size: 11px; }
  .pred-table th {
    text-align: left; padding: 6px 8px; color: var(--text-muted);
    border-bottom: 1px solid var(--border-strong); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.04em; font-family: var(--font);
  }
  .pred-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .pred-table .pos { color: var(--green); }
  .pred-table .neg { color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">GEPA<span>Prompt Optimizer</span></div>
  <span id="status" class="badge badge-idle">Idle</span>
  <select id="run-select" onchange="switchRun(this.value)"></select>
  <div class="header-stats">
    <div class="stat"><span class="stat-label">Student</span><span class="stat-value" id="student-model">--</span></div>
    <div class="stat"><span class="stat-label">Teacher</span><span class="stat-value" id="teacher-model">--</span></div>
    <div class="stat"><span class="stat-label">Sub-LM</span><span class="stat-value" id="sub-model">--</span></div>
    <div class="stat"><span class="stat-label">Cost</span><span class="stat-value" id="total-cost">--</span></div>
    <div class="stat"><span class="stat-label">I/O</span><span class="stat-value" id="io-totals">--</span></div>
    <div class="stat"><span class="stat-label">Elapsed</span><span class="stat-value" id="elapsed">--</span></div>
  </div>
</header>

<div class="layout">
  <div class="panel" id="candidates-panel">
    <div class="panel-header">Candidates</div>
    <div id="candidates-list">
      <div class="empty-state"><div class="empty-state-icon">&#9671;</div>Candidates appear after optimization</div>
    </div>
  </div>

  <div class="panel" id="detail-panel">
    <div id="detail-content">
      <div class="center-empty">Select a candidate or evaluation</div>
    </div>
  </div>

  <div class="panel" id="feed-panel">
    <div class="panel-header">Performance</div>
    <div id="perf-chart"></div>
    <div class="panel-header">Event Log</div>
    <div id="phase-indicator"></div>
    <div id="event-log">
      <div class="empty-state"><div class="empty-state-icon">&#9676;</div>Waiting for events</div>
    </div>
  </div>
</div>

<script>
const S = {
  events: [], manifest: null, candidates: [],
  selectedCandidate: null, selectedEval: null,
  runs: [], currentRun: null, userSelectedRun: false,
  elapsedTimer: null, stalenessTimer: null, lastEventTs: 0,
};

function getHashRun() {
  const m = location.hash.match(/run=([^&]+)/);
  return m ? m[1] : null;
}

function setHashRun(id) {
  history.replaceState(null, "", `#run=${id}`);
}

marked.setOptions({ breaks: true, gfm: true });

function fmt(n, d = 2) { return n != null ? Number(n).toFixed(d) : "--"; }
function fmtK(n) { return n != null ? n >= 1000 ? (n / 1000).toFixed(1) + "k" : String(n) : "--"; }
function shortModel(m) { return m ? m.replace("gemini/gemini-", "").replace("openai/", "").replace("-preview", "") : "--"; }
function escHtml(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function fmtElapsed(seconds) {
  if (seconds < 60) return Math.floor(seconds) + "s";
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return m + "m " + s + "s";
}

function renderMarkdown(text) {
  if (!text) return "";
  return marked.parse(text);
}

function renderOutput(text) {
  if (!text) return "";
  const hasMarkdown = /^#{1,4}\s|^\|.*\|.*\|/m.test(text);
  if (hasMarkdown) return '<div>' + marked.parse(text) + '</div>';
  return '<pre>' + escHtml(text) + '</pre>';
}

function startElapsedTimer() {
  stopElapsedTimer();
  const start = S.events.find(e => e.type === "optimization_start");
  if (!start?.ts) return;
  const startMs = new Date(start.ts).getTime();
  const tick = () => {
    const elapsed = (Date.now() - startMs) / 1000;
    document.getElementById("elapsed").textContent = fmtElapsed(elapsed);
  };
  tick();
  S.elapsedTimer = setInterval(tick, 1000);
  startStalenessDetection();
}

function stopElapsedTimer() {
  if (S.elapsedTimer) { clearInterval(S.elapsedTimer); S.elapsedTimer = null; }
  if (S.stalenessTimer) { clearInterval(S.stalenessTimer); S.stalenessTimer = null; }
}

function startStalenessDetection() {
  if (S.stalenessTimer) return;
  S.lastEventTs = Date.now();
  S.stalenessTimer = setInterval(() => {
    const end = S.events.find(e => e.type === "optimization_complete");
    if (end) { stopElapsedTimer(); return; }
    if (Date.now() - S.lastEventTs > 30000) {
      const el = document.getElementById("status");
      el.className = "badge badge-idle"; el.textContent = "Stalled";
      stopElapsedTimer();
    }
  }, 5000);
}

function updateHeader() {
  const start = S.events.find(e => e.type === "optimization_start");
  const end = S.events.find(e => e.type === "optimization_complete");
  const el = document.getElementById("status");

  if (end) {
    el.className = "badge badge-complete"; el.textContent = "Complete";
    stopElapsedTimer();
    document.getElementById("elapsed").textContent = fmtElapsed(end.elapsed_seconds);
  } else if (start) {
    el.className = "badge badge-running"; el.textContent = "Running";
    startElapsedTimer();
  } else {
    el.className = "badge badge-idle"; el.textContent = "Idle";
    stopElapsedTimer();
  }

  if (start) {
    const re = start.reasoning_effort ?? start.student_reasoning ?? null;
    document.getElementById("student-model").textContent = shortModel(start.student_model) + (re ? ` (${re})` : "");
    document.getElementById("teacher-model").textContent = shortModel(start.teacher_model) + (re ? ` (${re})` : "");
    document.getElementById("sub-model").textContent = shortModel(start.sub_model) + (re ? ` (${re})` : "");
  }

  // Cost and I/O: prefer manifest, then completion event, then latest stats event
  const latestStats = S.events.filter(e => e.type === "stats").at(-1);
  const costSource = S.manifest ?? end ?? latestStats;
  const cost = costSource?.total_cost_usd ?? null;
  document.getElementById("total-cost").textContent = cost != null ? "$" + fmt(cost, 2) : "--";

  const ioSource = S.manifest ?? end ?? latestStats;
  const ioEl = document.getElementById("io-totals");
  if (ioSource?.student?.input_tokens != null) {
    const s = ioSource.student, t = ioSource.teacher, sub = ioSource.sub;
    ioEl.textContent = `R:${fmtK(s.input_tokens)}/${fmtK(s.output_tokens)} T:${fmtK(t.input_tokens)}/${fmtK(t.output_tokens)} S:${fmtK(sub.input_tokens)}/${fmtK(sub.output_tokens)}`;
  } else {
    ioEl.textContent = "--";
  }
}

function renderRunSelect() {
  const sel = document.getElementById("run-select");
  sel.innerHTML = S.runs.map(r => {
    const d = r.startedAt ? new Date(r.startedAt) : null;
    const label = d
      ? d.toLocaleDateString("en-US", { month: "short", day: "numeric" }) + ", " + d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" })
      : r.id;
    const status = r.status === "complete" ? "done" : "live";
    const costStr = r.costUsd != null ? `, $${Number(r.costUsd).toFixed(2)}` : "";
    const selected = r.id === S.currentRun ? "selected" : "";
    return `<option value="${r.id}" ${selected}>${label} (${status}, ${r.evalCount} evals${costStr})</option>`;
  }).join("");
}

function renderCandidates() {
  const cands = S.events.filter(e => e.type === "candidate").sort((a, b) => (b.score ?? 0) - (a.score ?? 0));
  S.candidates = cands;
  const container = document.getElementById("candidates-list");
  if (!cands.length) return;

  const bestScore = cands[0]?.score;
  container.innerHTML = cands.map((c, i) => {
    const isBest = c.score === bestScore;
    const sel = S.selectedCandidate === c.idx ? "selected" : "";
    const best = isBest ? "best" : "";
    return `<div class="candidate ${sel} ${best}" data-idx="${c.idx}" onclick="selectCandidate(${c.idx})">
      <div class="candidate-row">
        <span class="candidate-idx">${isBest ? "&#9733; " : ""}#${c.idx}</span>
        <span class="candidate-score">${fmt(c.score, 4)}</span>
      </div>
      <div class="candidate-preview">${escHtml((c.instruction || "").slice(0, 120))}</div>
      <div class="candidate-meta">${c.parents ? "from #" + c.parents.join(", #") : "seed"} &middot; ${c.eval_count_at_discovery ?? "?"} evals</div>
    </div>`;
  }).join("");
}

function selectCandidate(idx) {
  S.selectedCandidate = idx;
  S.selectedEval = null;
  renderCandidates();
  renderEventLog();

  const cand = S.events.find(e => e.type === "candidate" && e.idx === idx);
  if (!cand) return;

  const container = document.getElementById("detail-content");
  container.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">Candidate #${idx}</div>
      <div class="detail-meta">
        <span>Score: ${fmt(cand.score, 4)}</span>
        <span>Lineage: ${cand.parents ? "#" + cand.parents.join(", #") : "seed"}</span>
      </div>
    </div>
    <div class="instruction-block">${escHtml(cand.instruction || "(empty)")}</div>
  `;
}

function selectEval(eventIdx) {
  S.selectedEval = eventIdx;
  S.selectedCandidate = null;
  renderCandidates();
  renderEventLog();

  const ev = S.events[eventIdx];
  if (!ev || !ev.trajectory) return;

  const container = document.getElementById("detail-content");
  let html = `<div class="traj-header">
    <div class="detail-title">Split ${ev.split ?? "?"}</div>
    <div class="traj-badge">RMSE ${fmt(ev.rmse)}</div>
    <div class="traj-badge">Score ${fmt(ev.score, 4)}</div>
    <div class="traj-badge">${ev.n_iterations ?? ev.trajectory.length} iterations</div>
  </div>`;

  if (ev.instruction_preview) {
    html += `<div style="margin-bottom:16px">
      <div class="code-label">Candidate instruction (${ev.pred_name || "predictor"})</div>
      <div class="instruction-block" style="max-height:160px;font-size:11px">${escHtml(ev.instruction_preview)}</div>
    </div>`;
  }

  ev.trajectory.forEach((t, i) => {
    html += `<div class="iteration">
      <div class="iteration-label">Step ${i + 1}</div>`;

    if (t.reasoning) {
      html += `<div class="reasoning-block">${renderMarkdown(t.reasoning)}</div>`;
    }
    if (t.code) {
      html += `<div><div class="code-label">Code</div><div class="code-block"><pre class="language-python"><code class="language-python">${escHtml(t.code)}</code></pre></div></div>`;
    }
    if (t.output) {
      html += `<div><div class="code-label">Output</div><div class="output-block">${renderOutput(t.output)}</div></div>`;
    }
    html += `</div>`;
  });

  container.innerHTML = html;
  Prism.highlightAllUnder(container);
}

function getBaselineSize() {
  const start = S.events.find(e => e.type === "optimization_start");
  return start?.n_examples ?? 20;
}

function buildEvalIndex() {
  const nSplits = getBaselineSize();
  const evals = S.events.filter(e => e.type === "eval");
  const baselineSet = new Set(evals.slice(0, nSplits));

  // Map each mutation eval to its iteration using iteration marker events
  const iterEvents = S.events.filter(e => e.type === "iteration");
  const iterationOf = new Map();
  for (const ev of evals) {
    if (baselineSet.has(ev)) continue;
    const evIdx = S.events.indexOf(ev);
    let iterIdx = 0;
    for (const it of iterEvents) {
      if (S.events.indexOf(it) < evIdx) iterIdx = it.idx;
    }
    iterationOf.set(ev, iterIdx);
  }

  const mutationCount = evals.length - baselineSet.size;
  const iterationCount = iterEvents.length ? iterEvents[iterEvents.length - 1].idx : 0;
  return { baselineSet, iterationOf, nSplits, totalEvals: evals.length, mutationCount, iterationCount };
}

function getPhaseInfo() {
  const { nSplits, totalEvals, mutationCount } = buildEvalIndex();
  const baselineEvals = Math.min(totalEvals, nSplits);
  const isComplete = S.events.some(e => e.type === "optimization_complete");

  let phase = "idle";
  if (isComplete) phase = "complete";
  else if (mutationCount > 0) phase = "optimizing";
  else if (baselineEvals > 0) phase = "baseline";

  return { phase, baselineEvals, mutationEvals: mutationCount, totalEvals, nSplits };
}

function renderPhaseIndicator() {
  const container = document.getElementById("phase-indicator");
  const { phase, baselineEvals, mutationEvals, totalEvals, nSplits } = getPhaseInfo();

  if (phase === "idle") { container.innerHTML = ""; return; }

  let label, pct, countText, barClass;
  if (phase === "baseline") {
    label = "Phase 1 &mdash; Baseline";
    pct = Math.min(100, (baselineEvals / nSplits) * 100);
    countText = `${baselineEvals} / ${nSplits}`;
    barClass = "baseline";
  } else if (phase === "optimizing") {
    label = "Phase 2 &mdash; Optimizing";
    pct = Math.min(100, (mutationEvals / 830) * 100);
    countText = `${mutationEvals} mutation evals`;
    barClass = "optimizing";
  } else {
    label = "Complete";
    pct = 100;
    countText = `${totalEvals} total evals`;
    barClass = "complete";
  }

  container.innerHTML = `<div class="phase-progress">
    <span class="phase-label ${barClass}">${label}</span>
    <div class="phase-bar"><div class="phase-bar-fill ${barClass}" style="width:${pct}%"></div></div>
    <span class="phase-count">${countText}</span>
  </div>`;
}

function renderEventLog() {
  const container = document.getElementById("event-log");
  const visible = S.events.filter(e => e.type !== "candidate" && e.type !== "stats");
  if (!visible.length) return;

  renderPhaseIndicator();

  const { baselineSet, iterationOf } = buildEvalIndex();
  const reversed = visible.slice().reverse().slice(0, 200);
  let lastPhase = null;
  let lastIter = null;
  const rows = [];

  for (const ev of reversed) {
    if (ev.type === "phase") {
      const cls = ev.phase === "baseline" ? "baseline" : "optimizing";
      const label = ev.phase === "baseline"
        ? `Phase 1: Baseline Evaluation (${ev.n_splits ?? "?"} splits)`
        : "Phase 2: Optimization (constrained teacher)";
      rows.push(`<div class="phase-banner ${cls}">${label}</div>`);
      lastPhase = null;
      lastIter = null;
      continue;
    }

    if (ev.type === "iteration") continue;

    if (ev.type === "eval") {
      const isBaseline = baselineSet.has(ev);
      const phase = isBaseline ? "baseline" : "mutation";

      if (lastPhase !== null && phase !== lastPhase) {
        const cls = phase === "mutation" ? "optimizing" : "baseline";
        const label = phase === "mutation" ? "Mutation Evaluations" : "Baseline Evaluations";
        rows.push(`<div class="phase-banner ${cls}">${label}</div>`);
      }
      lastPhase = phase;

      if (!isBaseline) {
        const iterIdx = iterationOf.get(ev) ?? 0;
        if (iterIdx > 0 && iterIdx !== lastIter) {
          rows.push(`<div class="iter-separator">Iteration ${iterIdx}</div>`);
          lastIter = iterIdx;
        }
      } else {
        lastIter = null;
      }
    }

    const origIdx = S.events.indexOf(ev);
    const time = ev.ts ? new Date(ev.ts).toLocaleTimeString() : "";
    const sel = S.selectedEval === origIdx ? "selected" : "";
    let body = "";
    let clickAttr = "";
    let badgeClass = ev.type;
    let bodyClass = "";

    if (ev.type === "eval") {
      const isMutation = !baselineSet.has(ev);
      badgeClass = isMutation ? "eval-mutation" : "eval-baseline";
      bodyClass = isMutation ? "mutation" : "baseline";
      body = `Split ${ev.split ?? "?"}: RMSE ${fmt(ev.rmse)} &middot; Score ${fmt(ev.score, 4)} &middot; ${ev.n_iterations ?? "?"} iters`;
      clickAttr = `onclick="selectEval(${origIdx})"`;
    } else if (ev.type === "optimization_complete") {
      const parts = [`Finished in ${fmtElapsed(ev.elapsed_seconds)}`, `$${fmt(ev.total_cost_usd, 2)}`];
      if (ev.student) parts.push(`root: ${fmtK(ev.student.input_tokens)}in/${fmtK(ev.student.output_tokens)}out`);
      if (ev.sub) parts.push(`sub: ${fmtK(ev.sub.input_tokens)}in/${fmtK(ev.sub.output_tokens)}out`);
      body = parts.join(" &middot; ");
    } else if (ev.type === "optimization_start") {
      body = `${ev.n_examples} examples`;
    }

    const badgeLabel = badgeClass === "eval-baseline" ? "baseline"
      : badgeClass === "eval-mutation" ? "mutation"
      : ev.type.replace("_", " ");

    rows.push(`<div class="event ${sel}" ${clickAttr}>
      <div class="event-row">
        <span class="event-time">${time}</span>
        <span class="event-type ${badgeClass}">${badgeLabel}</span>
      </div>
      ${body ? `<div class="event-body ${bodyClass}">${body}</div>` : ""}
    </div>`);
  }

  container.innerHTML = rows.join("");
}

function renderChart() {
  const evals = S.events.filter(e => e.type === "eval" && e.score != null);
  if (!evals.length) return;

  const container = document.getElementById("perf-chart");
  container.innerHTML = "";

  const margin = { top: 8, right: 12, bottom: 24, left: 44 };
  const width = container.clientWidth - margin.left - margin.right;
  const height = 130 - margin.top - margin.bottom;

  const svg = d3.select(container).append("svg")
    .attr("viewBox", `0 0 ${width + margin.left + margin.right} ${height + margin.top + margin.bottom}`)
    .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const x = d3.scaleLinear().domain([0, Math.max(1, evals.length - 1)]).range([0, width]);
  const yMax = d3.max(evals, d => d.score) * 1.05;
  const y = d3.scaleLinear().domain([0, yMax]).range([height, 0]);

  svg.selectAll(".grid-line")
    .data(y.ticks(4)).enter().append("line")
    .attr("x1", 0).attr("x2", width).attr("y1", d => y(d)).attr("y2", d => y(d))
    .attr("stroke", "rgba(255,255,255,0.04)");

  svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x).ticks(Math.min(evals.length, 8)).tickFormat(d3.format("d")))
    .call(g => g.select(".domain").attr("stroke", "rgba(255,255,255,0.08)"))
    .call(g => g.selectAll(".tick line").attr("stroke", "rgba(255,255,255,0.04)"))
    .call(g => g.selectAll(".tick text").attr("fill", "#666").style("font-family", "var(--mono)").style("font-size", "10px"));

  svg.append("g").call(d3.axisLeft(y).ticks(4).tickFormat(d3.format(".3f")))
    .call(g => g.select(".domain").remove())
    .call(g => g.selectAll(".tick line").remove())
    .call(g => g.selectAll(".tick text").attr("fill", "#666").style("font-family", "var(--mono)").style("font-size", "10px"));

  const gradientId = "area-grad";
  const defs = svg.append("defs");
  const gradient = defs.append("linearGradient").attr("id", gradientId).attr("x1", 0).attr("x2", 0).attr("y1", 0).attr("y2", 1);
  gradient.append("stop").attr("offset", "0%").attr("stop-color", "var(--accent)").attr("stop-opacity", 0.15);
  gradient.append("stop").attr("offset", "100%").attr("stop-color", "var(--accent)").attr("stop-opacity", 0);

  const area = d3.area().x((_, i) => x(i)).y0(height).y1(d => y(d.score)).curve(d3.curveMonotoneX);
  svg.append("path").datum(evals).attr("fill", `url(#${gradientId})`).attr("d", area);

  const line = d3.line().x((_, i) => x(i)).y(d => y(d.score)).curve(d3.curveMonotoneX);
  svg.append("path").datum(evals).attr("fill", "none").attr("stroke", "#50e3c2").attr("stroke-width", 1.5).attr("d", line);

  svg.selectAll(".dot").data(evals).enter().append("circle")
    .attr("cx", (_, i) => x(i)).attr("cy", d => y(d.score)).attr("r", 2.5)
    .attr("fill", "#50e3c2").attr("stroke", "#000").attr("stroke-width", 1);
}

function render() {
  updateHeader();
  renderCandidates();
  renderEventLog();
  renderChart();
}

async function fetchRuns() {
  try {
    S.runs = await fetch("/api/runs").then(r => r.json());
    if (S.runs.length && !S.currentRun) {
      const hashRun = getHashRun();
      if (hashRun && S.runs.some(r => r.id === hashRun)) {
        S.currentRun = hashRun;
        S.userSelectedRun = true;
      } else {
        S.currentRun = S.runs[0].id;
      }
      setHashRun(S.currentRun);
    }
    renderRunSelect();
  } catch (e) {
    console.error("Failed to fetch runs:", e);
  }
}

async function fetchRunData(runId) {
  try {
    const [events, manifest] = await Promise.all([
      fetch(`/api/events?run=${runId}`).then(r => r.json()),
      fetch(`/api/manifest?run=${runId}`).then(r => r.ok ? r.json() : null),
    ]);
    S.events = events;
    S.manifest = manifest;
    S.selectedCandidate = null;
    S.selectedEval = null;
    render();
  } catch (e) {
    console.error("Failed to fetch run data:", e);
  }
}

async function switchRun(runId) {
  S.currentRun = runId;
  S.userSelectedRun = true;
  setHashRun(runId);
  stopElapsedTimer();
  await fetchRunData(runId);
}

function connectSSE() {
  const source = new EventSource("/api/stream");
  source.onmessage = (msg) => {
    try {
      const ev = JSON.parse(msg.data);
      if (ev.type === "connected") return;
      const evRun = ev._run;
      delete ev._run;

      S.lastEventTs = Date.now();

      if (ev.type === "manifest") {
        if (evRun === S.currentRun) { S.manifest = ev; render(); }
      } else {
        // Auto-switch to new run only if user hasn't manually selected and it's genuinely new
        const isNewRun = ev.type === "optimization_start"
          && evRun !== S.currentRun
          && !S.userSelectedRun
          && !S.runs.some(r => r.id === evRun);
        if (isNewRun) {
          S.currentRun = evRun;
          S.events = [ev];
          S.manifest = null;
          S.selectedCandidate = null;
          S.selectedEval = null;
          setHashRun(evRun);
          fetchRuns();
          render();
          return;
        }
        if (evRun === S.currentRun) {
          S.events.push(ev);
          if (ev.type === "stats") { updateHeader(); }
          else { render(); }
        }
        if (ev.type === "eval" || ev.type === "optimization_complete") fetchRuns();
      }
    } catch {}
  };
  source.onerror = () => { source.close(); setTimeout(connectSSE, 3000); };
}

async function init() {
  await fetchRuns();
  if (S.currentRun) await fetchRunData(S.currentRun);
  connectSSE();
}

init();
</script>
